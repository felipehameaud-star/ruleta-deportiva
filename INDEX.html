<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta Deportiva</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;color:#fff;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh;overflow-x:hidden;}
@keyframes flotar{0%{opacity:0;transform:translateY(0)}10%{opacity:.15}90%{opacity:.15}100%{opacity:0;transform:translateY(-110vh)}}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
h1{font-size:clamp(1.2rem,4vw,1.8rem);font-weight:900;color:#ffd200;margin-bottom:4px;text-transform:uppercase;text-align:center;}
.sub{color:#aaa;font-size:.82rem;margin-bottom:12px;}
.premios{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;width:100%;max-width:520px;}
.pm{border-radius:10px;padding:8px 12px;font-size:.8rem;font-weight:700;text-align:center;color:#fff;flex:1;min-width:110px;}
.form{background:rgba(255,255,255,.08);border-radius:12px;padding:16px;width:100%;max-width:520px;margin-bottom:14px;}
input{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:.92rem;outline:none;}
input::placeholder{color:rgba(255,255,255,.4);}
#btnGirar{width:100%;padding:13px;background:linear-gradient(90deg,#f7971e,#ffd200);border:none;border-radius:10px;font-size:1rem;font-weight:900;color:#1a1a2e;cursor:pointer;text-transform:uppercase;}
#btnGirar:disabled{opacity:.5;cursor:not-allowed;}
.wrap{position:relative;margin-bottom:14px;}
.flecha{position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #ffd200;z-index:5;filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));}
#res{display:none;background:rgba(255,255,255,.08);border-radius:12px;padding:18px;width:100%;max-width:520px;text-align:center;margin-bottom:10px;}
#res.show{display:block;animation:pop .35s ease;}
.ri{font-size:2.5rem;}
.rt{font-size:1.15rem;font-weight:800;color:#ffd200;margin:6px 0 2px;}
.rp{font-size:.85rem;color:#ddd;margin-bottom:8px;}
.badge{display:inline-block;padding:7px 18px;border-radius:16px;font-weight:800;font-size:.95rem;color:#fff;margin-bottom:8px;}
.rinfo{font-size:.8rem;color:#aaa;}
.rinfo b{color:#fff;}
.btns{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap;}
.btn{padding:8px 18px;border:2px solid #ffd200;border-radius:8px;background:transparent;color:#ffd200;font-weight:700;font-size:.82rem;cursor:pointer;}
.btn:hover{background:#ffd200;color:#1a1a2e;}
.btn-g{border:none;background:linear-gradient(90deg,#11998e,#38ef7d);color:#1a1a2e;padding:8px 18px;border-radius:8px;font-weight:800;font-size:.82rem;cursor:pointer;}
#pgHist{display:none;width:100%;max-width:700px;}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
th{color:#ffd200;padding:7px 5px;border-bottom:1px solid rgba(255,255,255,.2);text-align:left;}
td{padding:6px 5px;border-bottom:1px solid rgba(255,255,255,.07);}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-weight:700;font-size:.72rem;color:#fff;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a9d8f;color:#fff;padding:10px 24px;border-radius:20px;font-weight:700;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div id="fondo" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;"></div>
<div id="toast" class="toast"></div>

<div id="pgMain" style="width:100%;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;">
  <h1>Ruleta Deportiva</h1>
  <p class="sub">Gira y gana premios</p>

  <div class="premios">
    <div class="pm" style="background:#e63946">Whey Protein<br>TV 50"</div>
    <div class="pm" style="background:#457b9d">Creatina<br>Experiencia Deportiva</div>
    <div class="pm" style="background:#2a9d8f">Mega Protein<br>Bicicleta</div>
  </div>

  <div class="form">
    <input id="fN" type="text"  placeholder="Nombre completo" />
    <input id="fF" type="text"  placeholder="Farmacia" />
    <input id="fE" type="email" placeholder="Correo electronico" />
    <button id="btnGirar">GIRAR RULETA</button>
  </div>

  <div class="wrap">
    <div class="flecha"></div>
    <canvas id="cv" width="480" height="480" style="border-radius:50%;box-shadow:0 0 40px rgba(255,210,0,.25);display:block;max-width:88vw;max-height:88vw;"></canvas>
  </div>

  <div id="res">
    <div class="ri" id="ri"></div>
    <div class="rt" id="rt"></div>
    <div class="rp" id="rp"></div>
    <div class="badge" id="rb"></div><br>
    <div class="rinfo" id="rf"></div>
    <div class="btns">
      <button class="btn" id="btnReset">Otra vez</button>
      <button class="btn" id="btnH">Ver historial</button>
    </div>
  </div>
</div>

<div id="pgHist" style="position:relative;z-index:1;">
  <h1 style="margin-bottom:14px">Historial de Participantes</h1>
  <div style="background:rgba(255,255,255,.07);border-radius:12px;padding:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
      <span id="hc" style="color:#aaa;font-size:.82rem;"></span>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-g" id="btnWord">Exportar Word</button>
        <button class="btn"   id="btnBack">Volver</button>
      </div>
    </div>
    <div id="htbl"></div>
  </div>
</div>

<script>
// ── REEMPLAZA ESTA URL CON LA TUYA DE APPS SCRIPT ──
var SHEETS_URL = "https://script.google.com/macros/s/AKfycbxYO9hfCDm2M-TF9tlHa7brSguXtnDxRZvRab4suEw8t2y4cTCIf_QhLOMGwjC3k-3Y/exec";

// ── FONDO ──
var emos = ['💪','🏋️','🥊','🚴','🏃','⚡','🔥','🎯','🏆','🥇','🧴','🫙','🥤','🦾','🦵','💥'];
var fondo = document.getElementById('fondo');
for (var fi=0;fi<25;fi++){
  var sp=document.createElement('span');
  sp.textContent=emos[Math.floor(Math.random()*emos.length)];
  sp.style.cssText='position:absolute;bottom:-60px;left:'+Math.random()*100+'vw;font-size:'+(1.3+Math.random()*1.8)+'rem;animation:flotar '+(10+Math.random()*14)+'s -'+(Math.random()*18)+'s linear infinite;pointer-events:none;';
  fondo.appendChild(sp);
}

// ── TOAST ──
function toast(msg, ok) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = ok ? '#2a9d8f' : '#e63946';
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── SEGMENTOS ──
var S = [
  {n:"Whey Protein", c:"#e63946", pr:'TV de 50"',            ic:"📺", e:"Whey Protein"},
  {n:"Creatina",     c:"#457b9d", pr:"Experiencia Deportiva", ic:"🏅", e:"Creatina"},
  {n:"Mega Protein", c:"#2a9d8f", pr:"Bicicleta",             ic:"🚲", e:"Mega Protein"},
  {n:"Whey Protein", c:"#c1121f", pr:'TV de 50"',            ic:"📺", e:"Whey Protein"},
  {n:"Creatina",     c:"#6a4c93", pr:"Experiencia Deportiva", ic:"🏅", e:"Creatina"},
  {n:"Mega Protein", c:"#e76f51", pr:"Bicicleta",             ic:"🚲", e:"Mega Protein"}
];
var N=S.length, ARC=2*Math.PI/N;
var CX=240, CY=240, R=232;
var cv=document.getElementById('cv');
var ctx=cv.getContext('2d');
var girando=false, currentRot=0, hist=[];

function draw(rot){
  ctx.clearRect(0,0,480,480);
  for(var i=0;i<N;i++){
    var a=rot+i*ARC, b=a+ARC;
    ctx.beginPath(); ctx.moveTo(CX,CY); ctx.arc(CX,CY,R,a,b); ctx.closePath();
    ctx.fillStyle=S[i].c; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=2; ctx.stroke();
    ctx.save(); ctx.translate(CX,CY); ctx.rotate(a+ARC/2);
    ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='bold 17px Segoe UI';
    ctx.shadowColor='rgba(0,0,0,.9)'; ctx.shadowBlur=5;
    var words=S[i].n.split(' ');
    for(var j=0;j<words.length;j++)
      ctx.fillText(words[j],R-14,(j-(words.length-1)/2)*22);
    ctx.restore();
  }
  ctx.beginPath(); ctx.arc(CX,CY,32,0,2*Math.PI);
  var g=ctx.createRadialGradient(CX,CY,3,CX,CY,32);
  g.addColorStop(0,'#ffd200'); g.addColorStop(1,'#f7971e');
  ctx.fillStyle=g; ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.stroke();
  ctx.shadowBlur=0; ctx.font='20px serif'; ctx.textAlign='center'; ctx.fillStyle='#1a1a2e';
  ctx.fillText('🏆',CX,CY+7);
}
draw(0);

// ── ENVIAR A GOOGLE SHEETS ──
function enviarSheets(datos) {
  fetch(SHEETS_URL, {
    method:  "POST",
    mode:    "no-cors",
    headers: {"Content-Type":"application/json"},
    body:    JSON.stringify(datos)
  })
  .then(function(){ toast("Registro guardado en Google Sheets", true); })
  .catch(function(){ toast("No se pudo guardar en Sheets", false); });
}

// ── GIRAR ──
document.getElementById('btnGirar').onclick = function(){
  var n=document.getElementById('fN').value.trim();
  var f=document.getElementById('fF').value.trim();
  var e=document.getElementById('fE').value.trim();
  if(!n||!f||!e){alert('Completa todos los campos.');return;}
  if(girando)return;
  girando=true;
  document.getElementById('btnGirar').disabled=true;
  document.getElementById('res').classList.remove('show');

  var g=Math.floor(Math.random()*N);
  var segCenter=g*ARC+ARC/2;
  var dest=((-Math.PI/2-segCenter)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  dest+=(6+Math.floor(Math.random()*4))*2*Math.PI;

  var dur=5500, t0=null;
  function ease(t){return 1-Math.pow(1-t,4);}
  function frame(ts){
    if(!t0)t0=ts;
    var p=Math.min((ts-t0)/dur,1);
    currentRot=ease(p)*dest;
    draw(currentRot);
    if(p<1){requestAnimationFrame(frame);return;}
    currentRot=dest%(2*Math.PI);
    girando=false;
    var s=S[g];
    document.getElementById('ri').textContent=s.ic;
    document.getElementById('rt').textContent='Felicitaciones, '+n+'!';
    document.getElementById('rp').textContent='Salio: '+s.e+' - Participas por: '+s.pr;
    var b=document.getElementById('rb'); b.textContent=s.ic+' '+s.pr; b.style.background=s.c;
    document.getElementById('rf').innerHTML='Farmacia: <b>'+f+'</b> | <b>'+e+'</b>';
    document.getElementById('res').classList.add('show');
    var entrada={n:n,f:f,e:e,prod:s.n,prem:s.pr,fecha:new Date().toLocaleString('es-CL')};
    hist.unshift(entrada);
    enviarSheets({nombre:n, farmacia:f, email:e, producto:s.n, premio:s.pr, fecha:entrada.fecha});
  }
  requestAnimationFrame(frame);
};

// ── RESET ──
document.getElementById('btnReset').onclick=function(){
  document.getElementById('fN').value='';
  document.getElementById('fF').value='';
  document.getElementById('fE').value='';
  document.getElementById('res').classList.remove('show');
  document.getElementById('btnGirar').disabled=false;
  currentRot=0; draw(0);
};

// ── HISTORIAL ──
function irHist(){
  document.getElementById('pgMain').style.display='none';
  document.getElementById('pgHist').style.display='block';
  document.getElementById('hc').textContent=hist.length+' participante(s)';
  var w=document.getElementById('htbl');
  if(!hist.length){w.innerHTML='<p style="color:#aaa;padding:12px">Sin participantes aun.</p>';return;}
  var BC={'Whey Protein':'#e63946','Creatina':'#457b9d','Mega Protein':'#2a9d8f'};
  w.innerHTML='<table><thead><tr><th>#</th><th>Nombre</th><th>Farmacia</th><th>Email</th><th>Producto</th><th>Premio</th><th>Fecha</th></tr></thead><tbody>'+
    hist.map(function(x,i){
      return '<tr><td>'+(hist.length-i)+'</td><td>'+x.n+'</td><td>'+x.f+'</td><td>'+x.e+
      '</td><td><span class="tag" style="background:'+(BC[x.prod]||'#555')+'">'+x.prod+'</span></td>'+
      '<td><b>'+x.prem+'</b></td><td>'+x.fecha+'</td></tr>';
    }).join('')+'</tbody></table>';
}
document.getElementById('btnH').onclick=irHist;
document.getElementById('btnBack').onclick=function(){
  document.getElementById('pgHist').style.display='none';
  document.getElementById('pgMain').style.display='flex';
};

// ── EXPORTAR WORD ──
document.getElementById('btnWord').onclick=function(){
  if(!hist.length){alert('No hay datos.');return;}
  var BC={'Whey Protein':'#e63946','Creatina':'#457b9d','Mega Protein':'#2a9d8f'};
  var filas=hist.map(function(x,i){
    return '<tr><td>'+(hist.length-i)+'</td><td>'+x.n+'</td><td>'+x.f+'</td><td>'+x.e+
    '</td><td style="background:'+(BC[x.prod]||'#555')+';color:white;font-weight:bold">'+x.prod+'</td>'+
    '<td style="font-weight:bold">'+x.prem+'</td><td>'+x.fecha+'</td></tr>';
  }).join('');
  var html='<html><head><meta charset="UTF-8"><style>body{font-family:Calibri,sans-serif;font-size:11pt;}'+
    'table{border-collapse:collapse;width:100%;}th{background:#1a1a2e;color:#ffd200;padding:8px;}'+
    'td{padding:7px 8px;border:1px solid #ddd;}tr:nth-child(even){background:#f5f5f5;}</style></head>'+
    '<body><h1>Ruleta Deportiva - Historial</h1><p>Generado: '+new Date().toLocaleString('es-CL')+'</p>'+
    '<table><thead><tr><th>#</th><th>Nombre</th><th>Farmacia</th><th>Email</th><th>Producto</th><th>Premio</th><th>Fecha</th></tr></thead>'+
    '<tbody>'+filas+'</tbody></table></body></html>';
  var blob=new Blob([html],{type:'application/msword'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='historial_ruleta.doc';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
};
</script>
</body>
</html>
